<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Control Financiero - Iglesia Rosal</title>
<style>
  :root {
    --bg: #f5f4f1; --surface: #ffffff; --surface-2: #f0efec;
    --border: #e0ddd6; --text: #1a1a18; --text-2: #6b6862; --text-muted: #99958c;
    --success: #1d9e75; --danger: #e24b4a; --warning-bg: #faeeda; --warning-text: #854f0b;
    --accent: #2a78d6; --radius: 8px;
  }
  * { box-sizing: border-box; }
  body { font-family: -apple-system, "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 24px 16px 60px; }
  #app { max-width: 720px; margin: 0 auto; }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 20px; }
  .kpis { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
  .kpi { flex: 1; min-width: 130px; background: var(--surface-2); border-radius: var(--radius); padding: 14px; }
  .kpi p:first-child { font-size: 13px; color: var(--text-2); margin: 0 0 4px; }
  .kpi p:last-child { font-size: 20px; font-weight: 600; margin: 0; }
  .kpi.warn { background: var(--warning-bg); }
  .kpi.warn p { color: var(--warning-text); }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 16px 18px; margin-bottom: 20px; }
  .card p.title { font-size: 15px; font-weight: 600; margin: 0 0 12px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 10px; }
  label { font-size: 12px; color: var(--text-2); display: block; margin-bottom: 4px; }
  input, select { width: 100%; height: 36px; border: 1px solid var(--border); border-radius: var(--radius); padding: 0 10px; font-size: 14px; background: var(--surface); color: var(--text); }
  button { height: 38px; border-radius: var(--radius); border: 1px solid var(--border); background: var(--surface); cursor: pointer; font-size: 14px; }
  button:hover { background: var(--surface-2); }
  #btn-add { width: 100%; margin-top: 12px; background: var(--accent); color: white; border: none; font-weight: 500; }
  .filtros { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .filtro-btn.active { background: var(--text); color: white; }
  #buscar { flex: 1; min-width: 160px; }
  #conteo { font-size: 13px; color: var(--text-2); margin: 0 0 8px; }
  #lista { border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; margin-bottom: 24px; }
  .row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 14px; border-bottom: 1px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row.warn { background: var(--warning-bg); }
  .row .desc { font-size: 14px; font-weight: 500; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin: 0; }
  .row select.cat-select { height: 26px; font-size: 12px; padding: 0 6px; width: auto; display: inline-block; }
  .row .fecha { font-size: 12px; color: var(--text-2); }
  .row .monto { font-size: 14px; font-weight: 600; white-space: nowrap; }
  .monto.pos { color: var(--success); }
  .monto.neg { color: var(--danger); }
  #err { color: var(--danger); font-size: 13px; margin: 8px 0 0; display: none; }
</style>
</head>
<body>
<div id="app">
  <h1>Control Financiero - Iglesia Rosal 2026</h1>

  <div class="kpis">
    <div class="kpi"><p>Saldo actual (MXN)</p><p id="kpi-saldo">$0</p></div>
    <div class="kpi"><p>Ingresos 2026</p><p id="kpi-ing" style="color:var(--success)">$0</p></div>
    <div class="kpi"><p>Gastos 2026</p><p id="kpi-gas" style="color:var(--danger)">$0</p></div>
    <div class="kpi warn"><p>Por revisar</p><p id="kpi-revisar">0</p></div>
  </div>

  <div class="card">
    <p class="title">Registrar movimiento</p>
    <div class="grid">
      <div><label>Fecha</label><input type="date" id="f-fecha"></div>
      <div><label>Tipo</label><select id="f-tipo"><option value="I">Ingreso</option><option value="G">Gasto</option></select></div>
      <div><label>Moneda</label><select id="f-moneda"><option value="MXN">MXN</option><option value="USD">USD</option></select></div>
      <div><label>Monto</label><input type="number" id="f-monto" step="0.01" placeholder="0.00"></div>
    </div>
    <div class="grid" style="margin-top:10px">
      <div><label>Categoría</label><select id="f-cat"></select></div>
      <div style="grid-column: span 2"><label>Descripción</label><input type="text" id="f-desc" placeholder="Ej. Ofrenda dominical, pago de luz..."></div>
    </div>
    <button id="btn-add">Agregar movimiento</button>
    <p id="err"></p>
  </div>

  <div class="filtros">
    <button class="filtro-btn active" data-f="todos">Todos</button>
    <button class="filtro-btn" data-f="Ingreso">Ingresos</button>
    <button class="filtro-btn" data-f="Gasto">Gastos</button>
    <button class="filtro-btn" data-f="revisar" style="border-color:var(--warning-text);color:var(--warning-text)">Por revisar</button>
    <input type="text" id="buscar" placeholder="Buscar por descripción...">
  </div>

  <p id="conteo"></p>
  <div id="lista"></div>

  <div class="card">
    <p class="title">Gastos por categoría (MXN)</p>
    <div style="position:relative;width:100%;height:320px">
      <canvas id="chart" role="img" aria-label="Gráfica de barras de gastos por categoría en pesos mexicanos"></canvas>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>

let items = [];
let chart;
let filtro = 'todos';
const KEY = 'iglesia-movimientos-v1';

function fmt(n){ return '$' + Math.round(n).toLocaleString('es-MX'); }
function toMXN(item){ return item.moneda === 'USD' ? item.monto * TIPO_CAMBIO : item.monto; }

function populateCat(sel, tipo){
  const list = tipo === 'I' ? CATS_ING : CATS_GAS;
  sel.innerHTML = list.map(c => `<option value="${c}">${c}</option>`).join('');
}

document.getElementById('f-tipo').addEventListener('change', e=>{
  populateCat(document.getElementById('f-cat'), e.target.value);
});

document.getElementById('f-fecha').valueAsDate = new Date();

document.querySelectorAll('.filtro-btn').forEach(b=>{
  b.addEventListener('click', ()=>{
    document.querySelectorAll('.filtro-btn').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    filtro = b.dataset.f; render();
  });
});
document.getElementById('buscar').addEventListener('input', render);

function render(){
  const saldo = items.reduce((s,i)=> s + (i.tipo==='I' ? toMXN(i) : -toMXN(i)), 0);
  document.getElementById('kpi-saldo').textContent = fmt(saldo);
  document.getElementById('kpi-ing').textContent = fmt(items.filter(i=>i.tipo==='I').reduce((s,i)=>s+toMXN(i),0));
  document.getElementById('kpi-gas').textContent = fmt(items.filter(i=>i.tipo==='G').reduce((s,i)=>s+toMXN(i),0));
  document.getElementById('kpi-revisar').textContent = items.filter(i=>i.cat==='Otros Gastos').length;

  const q = document.getElementById('buscar').value.toLowerCase();
  let filtered = items.filter(i=>{
    if(filtro==='Ingreso' && i.tipo!=='I') return false;
    if(filtro==='Gasto' && i.tipo!=='G') return false;
    if(filtro==='revisar' && i.cat!=='Otros Gastos') return false;
    if(q && !(i.desc.toLowerCase().includes(q) || i.cat.toLowerCase().includes(q))) return false;
    return true;
  });
  filtered.sort((a,b)=> new Date(b.fecha)-new Date(a.fecha));
  document.getElementById('conteo').textContent = filtered.length + ' movimiento(s)';

  const lista = document.getElementById('lista');
  if(filtered.length===0){
    lista.innerHTML = '<p style="padding:16px;color:var(--text-muted);font-size:14px;margin:0">No hay movimientos con este filtro.</p>';
  } else {
    lista.innerHTML = filtered.map(i=>{
      const catList = i.tipo==='I' ? CATS_ING : CATS_GAS;
      const opts = catList.map(c=>`<option value="${c}" ${c===i.cat?'selected':''}>${c}</option>`).join('');
      const needsReview = i.cat==='Otros Gastos';
      return `
      <div class="row ${needsReview?'warn':''}">
        <div style="flex:1;min-width:0">
          <p class="desc">${i.desc}</p>
          <div style="display:flex;align-items:center;gap:6px;margin-top:2px">
            <select data-id="${i.id}" class="cat-select">${opts}</select>
            <span class="fecha">${new Date(i.fecha).toLocaleDateString('es-MX')}</span>
          </div>
        </div>
        <p class="monto ${i.tipo==='I'?'pos':'neg'}">
          ${i.tipo==='I' ? '+' : '-'}${i.moneda==='USD' ? '$'+i.monto.toFixed(2)+' USD' : fmt(i.monto)}
        </p>
      </div>`;
    }).join('');
    lista.querySelectorAll('.cat-select').forEach(sel=>{
      sel.addEventListener('change', e=>{
        const id = e.target.dataset.id;
        const it = items.find(x=>x.id===id);
        if(it){ it.cat = e.target.value; save(); render(); }
      });
    });
  }

  const gastos = items.filter(i=>i.tipo==='G');
  const byCat = {};
  gastos.forEach(i=>{ byCat[i.cat] = (byCat[i.cat]||0) + toMXN(i); });
  const labels = Object.keys(byCat).sort((a,b)=>byCat[b]-byCat[a]).slice(0,8);
  const data = labels.map(l=>Math.round(byCat[l]));

  if(chart) chart.destroy();
  chart = new Chart(document.getElementById('chart'), {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Gasto (MXN)', data, backgroundColor: '#2a78d6', borderRadius: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
  });
}

function save(){
  try { localStorage.setItem(KEY, JSON.stringify(items)); } catch(e) { console.error(e); }
}
function load(){
  try {
    const r = localStorage.getItem(KEY);
    items = r ? JSON.parse(r) : null;
  } catch(e) { items = null; }
  if(!items){
    items = SEED.map((t,idx)=>({id:'seed-'+idx, fecha:t[0], tipo:t[1], cat:t[2], desc:t[3], moneda:t[4], monto:t[5]}));
    save();
  }
  render();
}

document.getElementById('btn-add').addEventListener('click', ()=>{
  const fecha = document.getElementById('f-fecha').value;
  const tipo = document.getElementById('f-tipo').value;
  const moneda = document.getElementById('f-moneda').value;
  const monto = parseFloat(document.getElementById('f-monto').value);
  const cat = document.getElementById('f-cat').value;
  const desc = document.getElementById('f-desc').value || cat;
  const err = document.getElementById('err');
  if(!fecha || !monto || monto<=0){
    err.textContent = 'Ingresa una fecha y un monto válido.';
    err.style.display = 'block';
    return;
  }
  err.style.display = 'none';
  items.push({id:'m-'+Date.now(), fecha, tipo, cat, desc, moneda, monto});
  save();
  document.getElementById('f-monto').value = '';
  document.getElementById('f-desc').value = '';
  render();
});

load();
</script>
</body>
</html>
